<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G3赛季战场地图</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js">
<style>
body{font-family:sans-serif;padding:20px;background:#f0f4f8}
#app{max-width:1200px;margin:0 auto}
header{background:#fff;padding:16px;border-radius:8px;margin-bottom:16px}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>G3赛季战场地图 - 加载测试</h1>
    <p v-if="mapImg">✅ Vue 已加载，地图数据待填入</p>
    <p v-else>⏳ 加载中...</p>
  </header>
</div>

<script>
const { createApp, ref, onMounted } = Vue;

// 这里留空，先测试 Vue 能否运行
const MAP_IMG_DATA = "";

createApp({
  setup() {
    const mapImg = ref('');
    onMounted(() => {
      console.log('✅ Vue 应用已启动');
      // 如果数据存在才赋值
      if (MAP_IMG_DATA) {
        mapImg.value = MAP_IMG_DATA;
      }
    });
    return { mapImg };
  }
}).mount('#app');
</script>
</body>
</html>
