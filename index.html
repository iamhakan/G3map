<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>G3赛季战场地图 - 交互式标记工具</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js">
<style>
:root{--primary:#1E40AF;--accent:#0D9488;--bg:#F8FAFC;--fg:#1E3A8A;--muted:#E9EEF6;--border:#DBEAFE;--radius:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--fg);min-height:100vh}
header{background:#fff;border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:100}
header h1{font-size:16px;font-weight:600}
header p{font-size:12px;color:#64748B;margin-top:2px}
.container{max-width:1200px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:16px}
@media(min-width:768px){.container{flex-direction:row}}
.map-wrap{flex:1;min-width:0;background:#fff;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.3);padding:8px;position:relative}
.map-wrap svg{width:100%;height:auto;display:block;border-radius:4px}
.region-path{fill:rgba(255,255,255,0.02);stroke:rgba(255,255,255,0.5);stroke-width:0.25;cursor:pointer;transition:fill 0.2s,stroke 0.2s,stroke-width 0.2s}
.region-path:hover{fill:rgba(59,130,246,0.25) !important;stroke:#2563EB !important;stroke-width:0.8 !important}
.sidebar{width:100%}
@media(min-width:768px){.sidebar{width:280px;flex-shrink:0}}
.card{background:#fff;border-radius:var(--radius);border:1px solid rgba(255,255,255,0.3);padding:16px;margin-bottom:12px}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px}
.color-btn{width:100%;aspect-ratio:1;border-radius:6px;border:2px solid transparent;cursor:pointer;transition:transform 0.15s,border-color 0.15s}
.color-btn:hover{transform:scale(1.1)}
.color-btn.active{border-color:var(--primary);box-shadow:0 0 0 2px rgba(30,64,175,0.2)}
.btn{padding:8px 16px;border-radius:6px;border:none;font-size:14px;cursor:pointer;transition:opacity 0.15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:0.9}
.btn-primary{background:var(--primary);color:#fff}
.btn-outline{background:#fff;color:var(--fg);border:1px solid #CBD5E1}
.btn-danger{background:#fff;color:#EF4444;border:1px solid #FECACA}
.btn-group{display:flex;gap:8px}
.btn-group .btn{flex:1;justify-content:center}
.btn-success{background:#0D9488;color:#fff}
.help-text{font-size:12px;color:#64748B;line-height:1.6;list-style:none}
.help-text li{margin-bottom:4px;display:flex;gap:6px}
.help-text .num{color:var(--primary);font-weight:bold;min-width:16px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px;font-size:12px;color:#64748B}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-box{width:14px;height:14px;border-radius:3px;border:1px solid rgba(0,0,0,0.1)}
.mark-legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
.mark-legend-item{display:flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px}
.mark-legend-box{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);flex-shrink:0}
.mark-legend-input{border:none;background:transparent;font-size:12px;font-weight:700;color:rgba(30,64,175,0.9);width:80px;outline:none;border-bottom:1px solid transparent}
.mark-legend-input:focus{border-bottom-color:var(--border)}
.mark-legend-input::placeholder{font-weight:normal;color:#9CA3AF}
.mark-legend-del{cursor:pointer;color:#94A3B8;font-size:12px;line-height:1;padding:2px}
.mark-legend-del:hover{color:#EF4444}
.region-label{user-select:none;display:block;pointer-events:none}
.region-score{user-select:none;display:none}
.score-panel{background:#fff;border-radius:8px;border:1px solid #DBEAFE;padding:14px;margin-bottom:12px}
.score-panel-title{font-size:14px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.score-list{display:flex;flex-direction:column;gap:4px}
.zone-row{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:4px 6px;border-radius:5px;transition:background 0.15s;flex-wrap:wrap}
.zone-row:hover{background:#F1F5F9}
.zone-dot{width:11px;height:11px;border-radius:3px;flex-shrink:0;margin-top:3px}
.zone-name-input{font-weight:normal;font-size:13px;color:#9CA3AF;border:none;background:transparent;width:96px;outline:none;border-bottom:1px solid transparent;padding:0;cursor:text}
.zone-name-input.has-value{font-weight:700;color:rgba(30,64,175,0.9)}
.zone-name-input:focus{border-bottom:1px solid #93C5FD;background:#EFF6FF;border-radius:3px 3px 0 0;padding:0 2px;color:#374151}
.zone-pts{font-weight:700;color:#1E40AF;font-size:13px;white-space:nowrap;margin-left:auto}
.zone-regions{width:100%;padding-left:19px;font-size:11px;color:rgba(30,64,175,0.9);line-height:1.6;word-break:break-all}
.score-empty{font-size:12px;color:#94A3B8;text-align:center;padding:8px 0}
.color-toolbar{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.97);border:1px solid #E2E8F0;border-radius:8px;padding:8px 12px;margin-bottom:8px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.color-toolbar .color-grid{margin:0;width:auto;grid-template-columns:repeat(10,1fr)}
.color-toolbar .color-btn{width:26px;height:26px}
.color-toolbar .btn{padding:6px 12px;font-size:13px}
.color-toolbar-label{font-size:12px;color:#64748B;white-space:nowrap;margin-right:4px}
.sync-status{font-size:12px;color:#64748B;display:flex;align-items:center;gap:4px}
.sync-status .dot{display:inline-block;width:8px;height:8px;border-radius:50%}
.sync-status .dot.online{background:#22C55E}
.sync-status .dot.offline{background:#EF4444}
.sync-status .dot.saving{background:#EAB308;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#author{position:fixed;bottom:12px;right:16px;font-size:12px;color:#64748B;z-index:110;background:rgba(248,250,252,0.92);padding:4px 10px;border-radius:6px;border:1px solid #DBEAFE}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>G3赛季战场地图 - 交互式标记工具（面包军团）</h1>
    <p>点击地图中的85个区域进行颜色标记 · 数据自动同步云端</p>
  </header>
  <div class="container">
    <div class="map-wrap">
      <div class="color-toolbar">
        <span class="color-toolbar-label">选色：</span>
        <div class="color-grid">
          <button v-for="c in colors" :key="c.color" class="color-btn" :class="{active: currentColor === c.color}" :style="c.btnStyle" :title="c.title" @click="selectColor(c)"></button>
        </div>
        <button class="btn btn-primary" @click="applyColor">✓ 应用</button>
        <button class="btn btn-outline" @click="cancelSelect">✕ 取消</button>
        <button class="btn btn-danger" style="margin-left:8px" @click="resetAll">↺ 重置</button>
        <span class="sync-status" style="margin-left:8px">
          <span class="dot" :class="syncStatus"></span>
          {{ syncText }}
        </span>
      </div>
      <svg viewBox="0 0 100 78.5" xmlns="http://www.w3.org/2000/svg" @click.self="clearSelect">
        <image :href="mapImg" x="0" y="0" width="100" height="78.5" preserveAspectRatio="xMidYMid meet"/>
        <path v-for="p in mapPaths" :key="p.id" class="region-path" :data-id="p.id" :d="p.d" :style="getPathStyle(p.id)" @click.stop="toggleRegion(p.id)"/>
        <text v-for="t in labelTexts" :key="'l'+t.for" :x="t.x" :y="t.y" text-anchor="middle" dominant-baseline="middle" font-size="1.4" font-weight="bold" fill="#fff" stroke="#000" stroke-width="0.3" paint-order="stroke" pointer-events="none" class="region-label">{{ t.text }}</text>
        <text v-for="t in scoreTexts" :key="'s'+t.for" :x="t.x" :y="t.y" text-anchor="middle" dominant-baseline="middle" font-size="1.0" fill="#fff" stroke="#000" stroke-width="0.25" paint-order="stroke" pointer-events="none" class="region-score">{{ t.text }}</text>
      </svg>
      <div class="legend">
        <span class="legend-item"><span class="legend-box" style="background:rgba(255,255,255,0.5)"></span>未标记</span>
        <span class="legend-item"><span class="legend-box" style="background:rgba(59,130,246,0.3);border-color:#1E40AF"></span>已选中</span>
      </div>
      <div class="mark-legend">
        <div v-for="item in markLegendItems" :key="item.fill" class="mark-legend-item">
          <div class="mark-legend-box" :style="{background:item.fill}"></div>
          <input class="mark-legend-input" type="text" placeholder="描述..." :value="colorNames[item.fill]||''" @input="onLegendInput(item.fill, $event.target.value)"/>
          <span class="mark-legend-del" @click="removeMark(item.fill)">✕</span>
        </div>
      </div>
    </div>
    <div class="sidebar">
      <div class="score-panel">
        <div class="score-panel-title"><span>📊</span>军团积分统计排名</div>
        <div class="score-list">
          <div v-if="scoreRows.length===0" class="score-empty">标记颜色后自动统计各军团积分</div>
          <div v-for="row in scoreRows" :key="row.fill" class="zone-row">
            <div class="zone-dot" :style="{background:row.fill,border:'1px solid rgba(0,0,0,0.15)'}"></div>
            <input class="zone-name-input" :class="{'has-value': !!(colorNames[row.fill]&&colorNames[row.fill].trim())}" type="text" :value="(colorNames[row.fill]&&colorNames[row.fill].trim()) ? colorNames[row.fill] : '请填写军团名'" placeholder="请填写军团名" @focus="onNameFocus(row.fill, $event)" @input="onNameInput(row.fill, $event.target.value)" @blur="onNameBlur(row.fill, $event)"/>
            <span class="zone-pts">{{ row.total.toLocaleString() }}分</span>
            <div class="zone-regions">{{ row.labels.join('；') }}</div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">💾 数据备份</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-primary" @click="exportData">📤 导出数据</button>
          <button class="btn btn-outline" @click="importData">📥 导入数据</button>
          <button class="btn btn-success" @click="syncNow">🔄 同步云端</button>
          <span style="font-size:12px;color:#94A3B8;line-height:36px;">导出JSON备份，云端自动同步</span>
        </div>
      </div>
      <div class="card">
        <div class="card-title">使用说明</div>
        <ul class="help-text">
          <li><span class="num">1</span>在地图上方工具条选择目标颜色</li>
          <li><span class="num">2</span>点击地图区域选中（蓝色边框高亮），支持多选；再次点击取消选中</li>
          <li><span class="num">3</span>点击「✓ 应用」将颜色标记到所有选中区域</li>
          <li><span class="num">4</span>点击「✕ 取消」清空当前选中，不改变已标记颜色</li>
          <li><span class="num">5</span>点击「↺ 重置」清除全部标记，恢复初始状态</li>
          <li><span class="num">6</span>右侧积分排名自动统计，点击"请填写军团名"可命名</li>
          <li><span class="num">7</span>底部图例可为颜色添加描述，与军团名双向同步</li>
          <li><span class="num">8</span>标记状态自动保存云端，多设备共享，数据永不丢失</li>
        </ul>
      </div>
    </div>
  </div>
  <div id="author">作者：凌云阁-天上明月</div>
</div>

<script>
const { createApp, ref, reactive, computed, onMounted } = Vue;

// ============================================================
// 1️⃣ 配置区域（请填写您的 JSONBin 信息）
// ============================================================
const JSONBIN_BIN_ID = '6a4ffd9ef5f4af5e29794418';
const JSONBIN_API_KEY = '$2a$10$gtX3QL336wdfK8a45zzuie6PBEG.eqOItENNjS4qHK8/M9QrLzFKi';
const LS_KEY = 'g3map_state_v1';
const TRANSPARENT_FILLS = new Set(['rgba(255,255,255,0.05)', 'rgba(255,255,255,0.02)', '']);

// ============================================================
// 2️⃣ 大段数据（请将您的数据粘贴到下方）
// ============================================================

  




// ============================================================
// 3️⃣ 颜色配置
// ============================================================
const COLORS = [
  {color:'transparent', fill:'rgba(255,255,255,0.02)', title:'透明', btnStyle:'background:#fff;border:1px solid #ddd'},
  {color:'#EF4444', fill:'rgba(239,68,68,0.55)',   title:'红色', btnStyle:'background:#EF4444'},
  {color:'#F97316', fill:'rgba(249,115,22,0.55)',  title:'橙色', btnStyle:'background:#F97316'},
  {color:'#EAB308', fill:'rgba(234,179,8,0.55)',   title:'黄色', btnStyle:'background:#EAB308'},
  {color:'#22C55E', fill:'rgba(34,197,94,0.55)',   title:'绿色', btnStyle:'background:#22C55E'},
  {color:'#06B6D4', fill:'rgba(6,182,212,0.55)',   title:'青色', btnStyle:'background:#06B6D4'},
  {color:'#3B82F6', fill:'rgba(59,130,246,0.55)',  title:'蓝色', btnStyle:'background:#3B82F6'},
  {color:'#8B5CF6', fill:'rgba(139,92,246,0.55)',  title:'紫色', btnStyle:'background:#8B5CF6'},
  {color:'#EC4899', fill:'rgba(236,72,153,0.55)',  title:'粉色', btnStyle:'background:#EC4899'},
  {color:'#6B7280', fill:'rgba(107,114,128,0.55)', title:'灰色', btnStyle:'background:#6B7280'},
];

// ============================================================
// 4️⃣ Vue 应用
// ============================================================
createApp({
  setup() {
    const mapImg = ref('');
    const mapPaths = ref([]);
    const labelTexts = ref([]);
    const scoreTexts = ref([]);
    const colors = ref(COLORS);
    const currentColor = ref('transparent');
    const currentFill = ref('rgba(255,255,255,0.02)');
    const selectedMap = reactive({});
    const pathFills = reactive({});
    const colorNames = reactive({});
    const syncStatus = ref('online');
    const syncText = ref('已同步');

    // 云端存储
    async function saveToCloud() {
      try {
        syncStatus.value = 'saving';
        syncText.value = '保存中...';
        const fills = {};
        Object.entries(pathFills).forEach(([id, fill]) => {
          if (fill && !TRANSPARENT_FILLS.has(fill)) fills[id] = fill;
        });
        const data = { fills, colorNames: { ...colorNames } };
        const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
          body: JSON.stringify(data)
        });
        if (!res.ok) throw new Error('保存失败');
        syncStatus.value = 'online';
        syncText.value = '已同步';
        saveLocal();
      } catch(e) {
        console.error('云端保存失败', e);
        syncStatus.value = 'offline';
        syncText.value = '离线(本地)';
        saveLocal();
      }
    }

    async function loadFromCloud() {
      try {
        const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
          headers: { 'X-Master-Key': JSONBIN_API_KEY }
        });
        if (!res.ok) throw new Error('加载失败');
        const json = await res.json();
        const data = json.record;
        Object.keys(pathFills).forEach(k => delete pathFills[k]);
        Object.keys(colorNames).forEach(k => delete colorNames[k]);
        Object.entries(data.fills || {}).forEach(([id, fill]) => { pathFills[id] = fill; });
        Object.entries(data.colorNames || {}).forEach(([fill, name]) => { colorNames[fill] = name; });
        syncStatus.value = 'online';
        syncText.value = '已同步';
        saveLocal();
        return true;
      } catch(e) {
        console.error('云端加载失败，使用本地缓存', e);
        syncStatus.value = 'offline';
        syncText.value = '离线(本地)';
        loadLocal();
        return false;
      }
    }

    function saveLocal() {
      try {
        const fills = {};
        Object.entries(pathFills).forEach(([id, fill]) => {
          if (fill && !TRANSPARENT_FILLS.has(fill)) fills[id] = fill;
        });
        localStorage.setItem(LS_KEY, JSON.stringify({ fills, colorNames: { ...colorNames } }));
      } catch(e) {}
    }

    function loadLocal() {
      try {
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const state = JSON.parse(raw);
        Object.entries(state.fills || {}).forEach(([id, fill]) => { pathFills[id] = fill; });
        Object.entries(state.colorNames || {}).forEach(([fill, name]) => { colorNames[fill] = name; });
      } catch(e) {}
    }

    function saveState() { saveLocal(); saveToCloud(); }
    function loadState() { loadFromCloud().then(success => { if (!success) loadLocal(); }); }
    async function syncNow() { await saveToCloud(); }

    // 导出/导入
    function exportData() {
      const fills = {};
      Object.entries(pathFills).forEach(([id, fill]) => {
        if (fill && !TRANSPARENT_FILLS.has(fill)) fills[id] = fill;
      });
      const data = { fills, colorNames: { ...colorNames } };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `战场地图_${new Date().toISOString().slice(0,10)}.json`;
      a.click();
    }

    function importData() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.json';
      input.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            Object.keys(pathFills).forEach(k => delete pathFills[k]);
            Object.keys(colorNames).forEach(k => delete colorNames[k]);
            Object.entries(data.fills || {}).forEach(([id, fill]) => { pathFills[id] = fill; });
            Object.entries(data.colorNames || {}).forEach(([fill, name]) => { colorNames[fill] = name; });
            saveState();
            alert('✅ 导入成功！');
          } catch(err) {
            alert('❌ 文件格式错误，请选择正确的JSON文件');
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    // 地图操作
    function getPathStyle(id) {
      if (selectedMap[id]) {
        return { fill:'rgba(0,0,0,0.1)', stroke:'rgba(0,0,0,0.25)', strokeWidth:'0.7' };
      }
      const fill = pathFills[id] || 'rgba(255,255,255,0.05)';
      return { fill, stroke:'rgba(200,200,200,0.6)', strokeWidth:'0.25' };
    }

    function selectColor(c) { currentColor.value = c.color; currentFill.value = c.fill; }
    function toggleRegion(id) { if (selectedMap[id]) delete selectedMap[id]; else selectedMap[id] = true; }
    function clearSelect() { Object.keys(selectedMap).forEach(k => delete selectedMap[k]); }
    function cancelSelect() { clearSelect(); }

    function applyColor() {
      const ids = Object.keys(selectedMap);
      if (ids.length === 0) return;
      ids.forEach(id => {
        const fill = currentFill.value;
        if (TRANSPARENT_FILLS.has(fill)) delete pathFills[id];
        else pathFills[id] = fill;
      });
      clearSelect();
      saveState();
    }

    function resetAll() {
      if (!confirm('确定要重置所有标记吗？')) return;
      Object.keys(pathFills).forEach(k => delete pathFills[k]);
      Object.keys(colorNames).forEach(k => delete colorNames[k]);
      clearSelect();
      saveState();
    }

    // 图例
    const markLegendItems = computed(() => {
      const fills = new Set();
      Object.values(pathFills).forEach(f => { if (f && !TRANSPARENT_FILLS.has(f)) fills.add(f); });
      return [...fills].map(fill => ({ fill }));
    });

    function onLegendInput(fill, val) { colorNames[fill] = val; saveState(); }
    function removeMark(fill) {
      Object.keys(pathFills).forEach(id => { if (pathFills[id] === fill) delete pathFills[id]; });
      delete colorNames[fill];
      saveState();
    }

    // 积分排名
    const scoreRows = computed(() => {
      const totals = {}, labels = {};
      Object.entries(pathFills).forEach(([id, fill]) => {
        if (!fill || TRANSPARENT_FILLS.has(fill)) return;
        const info = PATH_DATA[id];
        if (!info) return;
        totals[fill] = (totals[fill] || 0) + info.score;
        if (!labels[fill]) labels[fill] = [];
        const pathObj = MAP_PATHS.find(p => p.id === id);
        labels[fill].push(pathObj ? pathObj.label : id);
      });
      return Object.keys(totals).sort((a, b) => totals[b] - totals[a]).map(fill => ({
        fill, total: totals[fill],
        labels: (labels[fill] || []).slice().sort((a, b) => a.localeCompare(b, 'zh'))
      }));
    });

    function onNameFocus(fill, e) { if (e.target.value === '请填写军团名') e.target.value = ''; }
    function onNameInput(fill, val) { colorNames[fill] = val; saveState(); }
    function onNameBlur(fill, e) {
      if (!e.target.value.trim()) { colorNames[fill] = ''; e.target.value = '请填写军团名'; }
      saveState();
    }

    // 生命周期
    onMounted(() => {
      // mapImg.value = MAP_IMG_DATA;
      // mapPaths.value = MAP_PATHS;
      // labelTexts.value = LABEL_TEXTS;
