<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vue测试</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js">
</head>
<body>
<div id="app">
  <h1 style="color:red">页面显示了吗？</h1>
  <p>{{ msg }}</p>
</div>
<script>
const { createApp, ref } = Vue;

createApp({
  setup() {
    const msg = ref('✅ Vue 运行成功！');
    return { msg };
  }
}).mount('#app');
</script>
</body>
</html>
